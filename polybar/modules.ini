[module/cpu]
type = internal/cpu
interval = 0.5

format = <label>
label = %{T4}Ņīó%{T-} %{F#2eba1e}%percentage%%%{F-}
label-padding = 1


[module/network]
type = custom/script
exec = ~/.config/polybar/scripts/network-status.sh
interval = 3
format = <label>
label = %output%
label-foreground = #00FF41
label-padding = 2
click-left = nm-connection-editor

[module/wired-network]
type = internal/network
interface = enp8s0

; Accumulate values from all interfaces
; when querying for up/downspeed rate
; Default: false
accumulate-stats = true
interval = 3.0

; Available tags:
;   <label-connected> (default)
format-connected = <label-connected>

; Available tags:
;   <label-disconnected> (default)
format-disconnected = <label-disconnected>

; Available tags:
;   <label-connected> (default)
;   <label-packetloss>
;   <animation-packetloss>
format-packetloss = <animation-packetloss> <label-connected>

label-connected-padding = 2

; Default: %ifname% %local_ip%
label-connected =  Wired Ōåō%downspeed% Ōåæ%upspeed%
label-connected-foreground = #00FF41

; Default: (none)
label-disconnected =
label-disconnected-foreground = #666666

[module/wireless-network]
type = internal/network
interface = wlp7s0
interval = 3.0
accumulate-stats = true


format-connected = <ramp-signal> <label-connected>
format-disconnected = <label-disconnected>

label-connected =  %essid% Ōåō%downspeed% Ōåæ%upspeed%
label-connected-foreground = #00FF41
label-connected-padding = 2

label-disconnected =  No WiFi
label-disconnected-foreground = #666666
label-disconnected-padding = 2

ramp-signal-0 = ¾░ż»
