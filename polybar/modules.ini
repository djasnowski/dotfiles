[module/weather]
type = custom/script
exec = ~/.config/polybar/scripts/weather.sh
interval = 300
format = <label>
label = %output%
label-font = 0
click-left = ~/.config/polybar/scripts/weather-details.sh

[module/bluetooth]
type = custom/script
exec = ~/.config/rofi-bluetooth/rofi-bluetooth --status
interval = 1
format-padding = 2
format-foreground = ${colors.fg-alt}
click-left = ~/.config/rofi-bluetooth/rofi-bluetooth &

[module/spotify]
type = custom/script
tail = true
format-prefix = " Ņ®▒ "
format-spotify-width = 600
format = <label>
format-background = ${color.bg-alt}
format-foreground = ${color.fg-alt}
exec = ~/.config/polybar/scripts/scroll_spotify_status.sh
click-left = i3-msg '[class="Spotify"] focus'

[module/previous]
type = custom/script
interval = 86400
format = "%{T3}<label>"
format-padding = 3
; Previous song icon
exec = echo "PREV"
; Check if spotify is running before displaying the icon
exec-if = "pgrep spotify -x"
line-size = 1
click-left = "dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.Previous"

[module/next]
type = custom/script
interval = 86400
format = "%{T3}<label>"
format-padding = 2
; Next song icon
exec = echo "NEXT"
; Check if spotify is running before displaying the icon
exec-if = "pgrep spotify -x"
line-size = 1
click-left = "dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.Next"

[module/playpause]
type = custom/ipc
hook-0 = echo "’üŗ’üī"
hook-1 = echo "’üī"
initial = 1
click-left = "dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.PlayPause"

[module/filesystem]
type = internal/fs

; Mountpoints to display
mount-0 = /

label-mounted-padding = 1
interval = 10
fixed-values = true
spacing = 4

format-mounted = <label-mounted>

label-mounted = %mountpoint%: %percentage_used%% of %total%


[module/pulseaudio]
type = internal/pulseaudio

sink = alsa_output.pci-0000_0d_00.4.analog-stereo
format-volume = <ramp-volume><label-volume>

label-volume = %percentage:3:2%%    
label-volume-foreground = ${colors.fg-alt}
label-volume-padding = 1

use-ui-max = false
interval = 5

ramp-volume-0 = "%{T4}ŅüÄ%{T-}"
ramp-volume-1 = "%{T4}ŅüŹ%{T-}"
ramp-volume-2 = "%{T4}ŅüÉ%{T-}"

label-muted = "Ņå┤ muted"   
click-middle = blueman-manager
click-right = pavucontrol

[module/date]
type = internal/date

label-foreground = ${colors.fg-alt}

date = %b %d

; Optional time format
time = %I:%M %p (%a)

date-alt = %A (%W/52), %B %d %Y
time-alt = %H:%M:%S %Z

format = ’ŚĄ <label>

label = %date%, %time%

[module/temperature]
type = internal/temperature
interval = 0.5

hwmon-path = /sys/class/hwmon/hwmon4/temp1_input

; Threshold temperature to display warning label (in degrees celsius)
thermal-zone = 0
base-temperature = 20
warn-temperature = 90

format = <ramp> <label>
format-padding = 1

; Warning
format-warn = <ramp> <label-warn>
format-warn-background = #ff0000
format-warn-foreground = #ffcc99
format-warn-padding = 1

label = %temperature-c%

label-warn = "%temperature-c%"

ramp-0 = ’ŗŗ
ramp-1 = ’ŗŖ
ramp-2 = ’ŗē
ramp-3 = ’ŗł
ramp-4 = ’ŗć

label-foreground = ${colors.fg-alt}

[module/i3]
type = internal/i3

pin-workspaces = true
strip-wsnumbers = false
index-sort = true
reverse-scroll = false

fuzzy-match = true
format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-background = #e60053

label-focused = %index%
label-focused-foreground = #ffffff
label-focused-background = ${colors.bg-alt}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.fg-alt}
label-unfocused-padding = 2

label-visible = %index%
label-visible-background = #3f3f3f
